<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Node fill/stroke pairs mirror webview-ui/src/NodeCard.tsx: dark card
       fill + colored border, one type color per shape. -->
  <!-- Left (hub): feature blue -->
  <rect x="1.5" y="7" width="5.5" height="10" rx="1.75" fill="#2a2d2e" stroke="#3794ff" stroke-width="1.3"/>
  <!-- Middle: data_model green, api_contract orange, business_rule purple -->
  <rect x="9.25" y="2" width="5.5" height="5" rx="1.5" fill="#2a2d2e" stroke="#2ea043" stroke-width="1.3"/>
  <rect x="9.25" y="9.5" width="5.5" height="5" rx="1.5" fill="#2a2d2e" stroke="#d29922" stroke-width="1.3"/>
  <rect x="9.25" y="17" width="5.5" height="5" rx="1.5" fill="#2a2d2e" stroke="#a371f7" stroke-width="1.3"/>
  <!-- Right: decision red, ui_component cyan -->
  <rect x="17" y="6" width="5.5" height="5" rx="1.5" fill="#2a2d2e" stroke="#f85149" stroke-width="1.3"/>
  <rect x="17" y="13" width="5.5" height="5" rx="1.5" fill="#2a2d2e" stroke="#39c5cf" stroke-width="1.3"/>
  <!-- Connectors: neutral, not full nodes -->
  <rect x="7" y="11.25" width="2.25" height="1.5" rx="0.5" fill="#6e7681"/>
  <rect x="14.75" y="8" width="2.25" height="1.5" rx="0.5" fill="#6e7681"/>
  <rect x="14.75" y="14.5" width="2.25" height="1.5" rx="0.5" fill="#6e7681"/>
</svg>
